<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thứ 6 dui dẻ chơi đi</title>
    <meta
      name="description"
      content="Bấm vào là bung ảnh thứ 6 dui dẻ chơi đi, hiệu ứng vui vui để trêu bạn bè."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage">
      <input class="toggle" type="checkbox" id="open-photo" />

      <section class="intro" aria-labelledby="page-title">
        <p class="badge">Chế độ: thứ 6 bật mood</p>
        <h1 id="page-title">Thứ 6 dui dẻ chơi đi</h1>
        <p class="lead">
          Hết tuần rồi, nghiêm túc vừa thôi. Nhấn nhẹ một cái là ảnh bung ra,
          tinh thần đi chơi tự động tăng ga.
        </p>

        <label class="launch" for="open-photo">
          <span class="launch-icon" aria-hidden="true">🏍️</span>
          <span class="launch-text">Nhấn để đi chơi</span>
        </label>
      </section>

      <section class="photo-zone" aria-label="Ảnh vui sau khi nhấp">
        <div class="speed-lines" aria-hidden="true"></div>
        <figure class="photo-pop">
          <div class="photo-sticker" aria-hidden="true">Thứ 6 dui dẻ!</div>
          <div
            class="photo-frame"
            role="img"
            aria-label="Hai người mặc áo trắng ngồi trên xe máy trong khoảnh khắc hài hước"
          ></div>
          <div class="photo-ticket" aria-hidden="true">Đi chơi liền</div>
          <figcaption>
            <strong>Team quá giang cấp tốc</strong>
            <span>Người lái: bình tĩnh. Người sau: thứ 6 là phải bung.</span>
          </figcaption>
        </figure>
      </section>

      <div class="confetti confetti-a" aria-hidden="true"></div>
      <div class="confetti confetti-b" aria-hidden="true"></div>
      <div class="confetti confetti-c" aria-hidden="true"></div>
      <div class="confetti confetti-d" aria-hidden="true"></div>
    </main>
  </body>
</html>
